##### =========================================
##### 🔌 PLUGINS (TPM)
##### =========================================

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Plugins base (mejoran defaults de tmux)
set -g @plugin 'tmux-plugins/tmux-sensible'

# Clipboard (copiar/pegar mejorado)
set -g @plugin 'tmux-plugins/tmux-yank'

# Persistencia de sesiones
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '15'

# Navegación y productividad
set -g @plugin 'fcsonline/tmux-thumbs'     # hints para copiar texto rápido
set -g @plugin 'sainnhe/tmux-fzf'          # fuzzy finder dentro de tmux
set -g @plugin 'wfxr/tmux-fzf-url'         # detectar URLs

# UI Theme (⚠️ si falla usar el oficial: catppuccin/tmux)
set -g @plugin 'omerxx/catppuccin-tmux'

# Workflow / sesiones
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'


##### =========================================
##### ⚙️ CONFIGURACIÓN DE PLUGINS
##### =========================================

## Floax (ventanas flotantes tipo popup)
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

## Sessionx (gestión de sesiones avanzada)
set -g @sessionx-bind 'o'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'

# ⚠️ Ajustar este path a tu sistema
set -g @sessionx-custom-paths '~/dotfiles'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-x-path '~/dotfiles'

## Persistencia automática
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'


##### =========================================
##### 🎨 UI / TEMA (CATPPUCCIN)
##### =========================================

# Separadores de ventanas
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"

# Contenido de ventanas
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

# Status bar
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "directory"

set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"

set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Mostrar path actual
set -g @catppuccin_directory_text "#{b:pane_current_path}"

# Bordes de paneles
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'


##### =========================================
##### ⚙️ COMPORTAMIENTO GENERAL
##### =========================================

# Recarga automática (si plugin lo soporta)
set -g @autoreload 'on'

# Soporte true color
set -sg terminal-overrides ",*:RGB"

# UX general
set -g escape-time 0          # elimina delay en ESC
set -g mouse on              # habilita mouse
set -g renumber-windows on   # renumera ventanas automáticamente
set -g repeat-time 1000      # tiempo para repetir comandos


##### =========================================
##### 🧠 NAVEGACIÓN / LAYOUT
##### =========================================

# Índices empiezan en 1 (más natural)
set -g base-index 1
set -g pane-base-index 1

# Status bar arriba
set -g status-position top


##### =========================================
##### ⌨️ KEYBINDINGS
##### =========================================

# Cambiar prefix de Ctrl+B → Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Navegación rápida entre ventanas
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

# Acciones rápidas
bind f resize-pane -Z   # fullscreen pane
bind q detach-client    # salir de sesión
bind e choose-window -Z # selector de ventanas


##### =========================================
##### 🚀 INICIALIZACIÓN TPM (SIEMPRE AL FINAL)
##### =========================================

run '~/.tmux/plugins/tpm/tpm'
